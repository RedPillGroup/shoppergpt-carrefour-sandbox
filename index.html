<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Assistant Traiteur — Carrefour</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { width: 100%; height: 100%; }
    body {
      min-height: 100vh;
      display: grid;
      grid-template-rows: 60px minmax(0, 1fr) 40px;
      font-family: "Inter", system-ui, sans-serif;
      background: #f5f7fa;
      color: #1a1a1a;
    }
    .navbar {
      background: rgb(245, 245, 245);
      color: white;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      box-shadow: 0 2px 8px rgba(0, 0, 0, 0.15);
      z-index: 10;
    }
    .navbar-store {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(38, 38, 38, 0.3);
      color: black;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
    }
    .cart-btn {
      background: rgba(255, 255, 255, 0.15);
      border: 1px solid rgba(38, 38, 38, 0.3);
      color: black;
      padding: 6px 14px;
      border-radius: 20px;
      font-size: 13px;
      cursor: pointer;
    }
    .cart-count {
      background: #e4002b;
      color: white;
      border-radius: 50%;
      width: 18px;
      height: 18px;
      font-size: 11px;
      font-weight: 700;
      display: none;
      align-items: center;
      justify-content: center;
    }
    #shoppergpt-chat { min-height: 0; height: 100%; overflow: hidden; }
    .footer {
      background: #2f2f2f;
      color: white;
      font-size: 12px;
      padding: 0 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    /* This navbar/footer are just sandbox chrome around the real widget, not
       part of the product itself — on a short viewport (e.g. an embedded
       preview frame, a small phone in landscape) they eat into space the
       widget actually needs more than a demo header/footer does. Below a
       minimum height, drop them and let the widget take the full screen. */
    @media (max-height: 500px) {
      body { grid-template-rows: minmax(0, 1fr); }
      .navbar, .footer { display: none; }
    }
    .modal-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 200;
      align-items: center;
      justify-content: center;
    }
    .modal-overlay.open { display: flex; }
    .modal {
      background: white;
      border-radius: 20px;
      padding: 24px;
      width: min(420px, 90vw);
      box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
    }
    .modal h2 { font-size: 18px; font-weight: 700; margin-bottom: 14px; }
    .store-option {
      display: flex;
      padding: 12px 14px;
      border-radius: 12px;
      cursor: pointer;
      border: 2px solid #e5e7eb;
      margin-bottom: 8px;
      background: white;
    }
    .store-option:hover, .store-option.selected { border-color: #004e9a; background: #eff6ff; }
    .store-name { font-weight: 500; font-size: 14px; }
    .store-address { font-size: 12px; color: #6b7280; margin-top: 2px; }
    .modal-close {
      width: 100%;
      margin-top: 10px;
      padding: 12px;
      border: none;
      background: #004e9a;
      color: white;
      border-radius: 12px;
      font-weight: 600;
      cursor: pointer;
      font-size: 14px;
    }
  </style>
</head>
<body>
  <nav class="navbar">
      <button class="navbar-store" onclick="openStoreModal()">
        📍 <span id="current-store-name">Choisir un magasin</span>
      </button>
      <button class="cart-btn" id="cart-btn">
        Panier
        <span class="cart-count" id="cart-count">0</span>
      </button>
  </nav>

  <!-- ShopperGPT widget -->
  <div id="shoppergpt-chat"></div>
  <!-- ShopperGPT widget -->

  <footer class="footer">
    <span>Carrefour Traiteur Sandbox</span>
    <span>OpenMage integration preview</span>
  </footer>

  <div class="modal-overlay" id="store-modal">
    <div class="modal">
      <h2>📍 Choisir mon magasin</h2>
      <div id="current-store-info"></div>
      <div style="display:flex; gap:8px; margin-bottom:12px;">
        <input id="store-postcode" type="text" inputmode="numeric" placeholder="Code postal (ex. 75001)"
          style="flex:1; padding:10px 12px; border:1px solid #d1d5db; border-radius:10px; font-size:14px;" />
        <button onclick="searchStores()"
          style="padding:10px 16px; border:none; background:#004e9a; color:#fff; border-radius:10px; font-weight:600; cursor:pointer;">
          Rechercher
        </button>
      </div>
      <div id="store-list" style="max-height:50vh; overflow-y:auto;"></div>
      <button class="modal-close" onclick="closeStoreModal()">Fermer</button>
    </div>
  </div>

  <script>
    const MODE_LABELS = {
      retrait: "Retrait sur place",
      drive: "Retrait drive",
      livraison: "Livraison",
    };

    let currentStore = null;   // { store_id, store_name } once the user picks one
    let lastStores = [];        // last fetched store list (for selection lookup)
    let cartCount = 0;

    // One session id for the whole page = the X-Session-Id (PHPSESSID in prod).
    // Keys the backend state/history/store. In prod this comes from the Magento cookie.
    const SESSION_ID = "sess_" + Math.random().toString(36).slice(2, 12);

    function apiBase() {
      return (window.SHOPPERGPT_CONFIG && window.SHOPPERGPT_CONFIG.apiUrl) || "";
    }
    function clientId() {
      return (window.SHOPPERGPT_CONFIG && window.SHOPPERGPT_CONFIG.clientId) || "carrefour_traiteur";
    }

    function updateCartUI() {
      const countEl = document.getElementById("cart-count");
      if (!countEl) return;
      countEl.textContent = String(cartCount);
      countEl.style.display = cartCount > 0 ? "flex" : "none";
    }

    function renderCurrentStoreInfo() {
      const el = document.getElementById("current-store-info");
      if (!el) return;
      if (!currentStore) { el.innerHTML = ""; return; }
      const addr = currentStore.address ? `<div style="font-size:12px;color:#6b7280;margin-top:2px;">${currentStore.address}</div>` : "";
      el.innerHTML = `
        <div style="background:#eff6ff;border:1px solid #bfdbfe;border-radius:12px;padding:12px 14px;margin-bottom:12px;">
          <div style="font-size:11px;color:#004e9a;font-weight:700;text-transform:uppercase;">Magasin sélectionné</div>
          <div style="font-weight:600;font-size:14px;margin-top:4px;"> ${currentStore.store_name}</div>
          ${addr}
        </div>`;
    }

    function openStoreModal() {
      document.getElementById("store-modal")?.classList.add("open");
      renderCurrentStoreInfo();
      const input = document.getElementById("store-postcode");
      if (input) { input.focus(); }
      if (!lastStores.length) {
        document.getElementById("store-list").innerHTML =
          '<p style="color:#6b7280;font-size:13px;">Entrez un code postal pour voir les magasins proches.</p>';
      }
    }

    function closeStoreModal() {
      document.getElementById("store-modal")?.classList.remove("open");
    }

    async function searchStores() {
      const input = document.getElementById("store-postcode");
      const list = document.getElementById("store-list");
      const postcode = (input?.value || "").trim();
      if (!postcode) { input?.focus(); return; }

      list.innerHTML = '<p style="color:#6b7280;font-size:13px;">Recherche en cours…</p>';
      try {
        const res = await fetch(`${apiBase()}/stores?postcode=${encodeURIComponent(postcode)}&limit=10`, {
          headers: { "x-client-id": clientId() },
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        lastStores = data.stores || [];
        renderStores(lastStores);
      } catch (e) {
        list.innerHTML = `<p style="color:#b91c1c;font-size:13px;">Erreur de recherche (${e.message}).</p>`;
      }
    }

    function renderStores(stores) {
      const list = document.getElementById("store-list");
      if (!stores.length) {
        list.innerHTML = '<p style="color:#6b7280;font-size:13px;">Aucun magasin trouvé pour ce code postal.</p>';
        return;
      }
      list.innerHTML = stores.map((s) => {
        // Each available mode is a clickable button → selects store + mode (like Carrefour).
        const buttons = (s.modes || [])
          .map((m) => `<button onclick="selectStore('${s.store_id}','${m}')" style="cursor:pointer;background:#004e9a;color:#fff;border:none;border-radius:8px;padding:6px 12px;font-size:12px;font-weight:600;margin-right:8px;margin-top:8px;">${MODE_LABELS[m] || m}</button>`)
          .join("");
        const dist = s.distance_km != null ? `${s.distance_km} km` : "";
        const selected = currentStore && String(currentStore.store_id) === String(s.store_id);
        return `
          <div class="store-option ${selected ? "selected" : ""}" style="cursor:default;">
            <div style="width:100%;">
              <div style="display:flex;justify-content:space-between;gap:8px;">
                <div class="store-name"> ${s.name} <span style="color:#9ca3af;font-weight:400;font-size:12px;">${s.type_label || ""}</span></div>
                <div style="color:#6b7280;font-size:12px;white-space:nowrap;">${dist}</div>
              </div>
              <div class="store-address">${s.address || ""}</div>
              <div>${buttons}</div>
            </div>
          </div>`;
      }).join("");
    }

    async function selectStore(storeId, mode) {
      const store = lastStores.find((s) => String(s.store_id) === String(storeId));
      if (!store) return;
      // livraison → send the LAD zone id ; retrait/drive → null (drive mode server-side)
      const lad_zone_id = mode === "livraison" ? (store.lad_zone_id ?? null) : null;
      try {
        const res = await fetch(`${apiBase()}/store/set`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-client-id": clientId(),
            "X-Session-Id": SESSION_ID,
          },
          body: JSON.stringify({ store_id: Number(store.store_id), lad_zone_id, mode }),
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
      } catch (e) {
        console.warn("[shopper-gpt] /store/set failed:", e);
      }
      currentStore = {
        store_id: store.store_id,
        store_name: store.name,
        mode: mode,
        address: store.address,
        lad_zone_id: lad_zone_id,
      };
      // Persist so next reload auto-restores + re-registers with backend
      try { localStorage.setItem("sgpt_store", JSON.stringify(currentStore)); } catch(e) {}
      document.getElementById("current-store-name").textContent =
        `${store.name} · ${MODE_LABELS[mode] || mode}`;
      window.dispatchEvent(new CustomEvent("shoppergpt:page_context", {
        detail: { store_id: store.store_id, store_name: store.name }
      }));
      closeStoreModal();
    }

    async function restoreStoredStore() {
      try {
        const raw = localStorage.getItem("sgpt_store");
        if (!raw) return;
        const s = JSON.parse(raw);
        if (!s || !s.store_id) return;
        // Re-register with the new session's backend
        await fetch(`${apiBase()}/store/set`, {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
            "x-client-id": clientId(),
            "X-Session-Id": SESSION_ID,
          },
          body: JSON.stringify({ store_id: Number(s.store_id), lad_zone_id: s.lad_zone_id ?? null, mode: s.mode }),
        });
        currentStore = s;
        document.getElementById("current-store-name").textContent = `${s.store_name}`;
        window.dispatchEvent(new CustomEvent("shoppergpt:page_context", {
          detail: { store_id: s.store_id, store_name: s.store_name }
        }));
      } catch(e) {
        console.warn("[shopper-gpt] store restore failed:", e);
      }
    }

    function fireInitialEvents() {
      window.dispatchEvent(new CustomEvent("shoppergpt:session", { detail: { session_id: SESSION_ID } }));
      if (currentStore) {
        window.dispatchEvent(new CustomEvent("shoppergpt:page_context", {
          detail: { store_id: currentStore.store_id, store_name: currentStore.store_name }
        }));
      }
    }

    window.addEventListener("shoppergpt:cart_updated", (e) => {
      const detail = e.detail || {};

      if (typeof detail.cart_count === "number") {
        cartCount = Math.max(0, detail.cart_count);
        updateCartUI();
        return;
      }

      if (detail.success === false) return;

      const action = String(detail.action || "").toLowerCase();
      if (action.includes("remove")) {
        cartCount = Math.max(0, cartCount - 1);
      } else if (action.includes("add")) {
        cartCount += 1;
      } else {
        return;
      }

      updateCartUI();
    });

    window.addEventListener("shoppergpt:change_shop", (e) => {
      const detail = e.detail || {};
      if (!detail.store_id) return;
      const store = lastStores.find((s) => String(s.store_id) === String(detail.store_id));
      const name = store ? store.name : (detail.store_name || `Magasin ${detail.store_id}`);
      currentStore = {
        store_id: detail.store_id,
        store_name: name,
        mode: detail.mode,
        address: store ? store.address : undefined,
      };
      document.getElementById("current-store-name").textContent = `${name}`;
    });

    window.addEventListener("DOMContentLoaded", () => {
      updateCartUI();
      const input = document.getElementById("store-postcode");
      if (input) {
        input.addEventListener("keydown", (e) => { if (e.key === "Enter") searchStores(); });
      }
      // Restore + re-register stored store before firing initial events so the widget
      // sees the store immediately on first render (no re-selection needed each reload).
      restoreStoredStore().finally(() => setTimeout(fireInitialEvents, 500));
    });
  </script>

  <!-- ShopperGPT widget — auto-switches between local dev and deployed -->
  <script>
    (function () {
      // Local = opened from file:// or served on localhost/127.0.0.1
      var host = window.location.hostname;
      var isLocal = host === "localhost" || host === "127.0.0.1" || host === "";
      // Local: hit the waib-api directly on :8000. Deployed: go through the gateway.
      var apiUrl = isLocal ? "http://127.0.0.1:8000" : "https://waib-gateway-dev.redpill.paris";

      // Fallback config (the widget prefers the script's data-* below).
      window.SHOPPERGPT_CONFIG = {
        apiUrl: apiUrl,
        clientId: "carrefour_traiteur",
        sessionId: SESSION_ID, // sandbox mock of the Carrefour PHPSESSID
      };

      // Local: load the freshly-built local bundle (sibling repo on disk).
      // Deployed: load the published bundle from Vercel.
      var src = isLocal
        ? "../shopper-gpt-carrefour-scriptag/dist/agent.js"
        : "https://shoppergpt-carrefour-scriptag.vercel.app/agent.js";

      var s = document.createElement("script");
      s.src = src;
      s.defer = true;
      // Mirror the prod embed: session + api passed via data-* on the script tag.
      s.dataset.sessionId = SESSION_ID;
      s.dataset.apiUrl = apiUrl;
      s.dataset.clientId = "carrefour_traiteur";
      s.dataset.sandbox = "true"; // sandbox flag — enables localStorage store persistence

      // Dev/testing only — open this page with ?mock=event or ?mock=products
      // to jump straight to that MenuBuilderPanel screen with canned data,
      // instead of re-chatting through the whole flow on every reload.
      var mockScreen = new URLSearchParams(window.location.search).get("mock");
      if (mockScreen === "event" || mockScreen === "products") {
        s.dataset.mockScreen = mockScreen;
      }

      document.body.appendChild(s);
    })();
  </script>
</body>
</html>
